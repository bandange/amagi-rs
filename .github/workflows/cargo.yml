name: Cargo CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  AMAGI_BUILD_GIT_HASH: ${{ github.sha }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check formatting
        run: cargo fmt --check

  check:
    name: check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1

      - name: Cargo check
        run: cargo check --locked --all-features

      - name: Version metadata smoke
        shell: bash
        env:
          AMAGI_LANG: en
          BUILD_TYPE: daily
        run: |
          version_output="$(cargo run --locked -p amagi --bin amagi -- --version)"
          printf '%s\n' "${version_output}"
          grep -F "Daily Build" <<<"${version_output}"
          grep -E "Version: daily-[0-9a-f]+ \\(built [0-9]{4}-[0-9]{2}-[0-9]{2}T" <<<"${version_output}"
          grep -E "Rustc: rustc [0-9]" <<<"${version_output}"
          grep -F "Target:" <<<"${version_output}"

  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1

      - name: Cargo test
        run: cargo test --locked --workspace

  doc:
    name: doc
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1

      - name: Cargo doc
        run: cargo doc --locked --no-deps --all-features

  docs-site:
    name: docs site
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install Dioxus CLI
        run: |
          curl -fsSL https://dioxus.dev/install.sh | bash -s -- v0.7.9
          dx --version

      - name: Build docs site
        env:
          DOCS_BASE_PATH: /${{ github.event.repository.name }}/
        run: dx build --package amagi-docs --base-path "$DOCS_BASE_PATH"

      - name: Prepare Pages artifact
        env:
          DOCS_BASE_PATH: /${{ github.event.repository.name }}
          DOCS_ASSET_VERSION: ${{ github.sha }}
        run: |
          docs_out="target/dx/amagi-docs/debug/web/public"
          python3 - <<'PY'
          import os
          from pathlib import Path

          docs_out = Path("target/dx/amagi-docs/debug/web/public")
          base_path = os.environ["DOCS_BASE_PATH"].rstrip("/")
          asset_version = os.environ["DOCS_ASSET_VERSION"]
          version_suffix = f"?v={asset_version}"
          index = docs_out / "index.html"
          html = index.read_text(encoding="utf-8")

          def replace_required(content, old, new, description):
              if old not in content:
                  raise RuntimeError(f"Could not find {description}: {old}")
              return content.replace(old, new)

          replacements = {
              'href="main.css"': f'href="{base_path}/main.css{version_suffix}"',
              'src="highlight.min.js"': f'src="{base_path}/highlight.min.js{version_suffix}"',
              'src="syntax-highlight.js"': f'src="{base_path}/syntax-highlight.js{version_suffix}"',
              f'src="{base_path}/wasm/amagi-docs.js"': f'src="{base_path}/wasm/amagi-docs.js{version_suffix}"',
          }
          for old, new in replacements.items():
              html = replace_required(html, old, new, "docs asset")
          for expected in replacements.values():
              if expected not in html:
                  raise RuntimeError(f"Missing versioned docs asset: {expected}")
          index.write_text(html, encoding="utf-8")
          (docs_out / "404.html").write_text(html, encoding="utf-8")
          (docs_out / ".nojekyll").write_text("", encoding="utf-8")

          wasm_loader = docs_out / "wasm" / "amagi-docs.js"
          js = wasm_loader.read_text(encoding="utf-8")
          js = replace_required(
              js,
              f'module_or_path: "{base_path}/wasm/amagi-docs_bg.wasm"',
              f'module_or_path: "{base_path}/wasm/amagi-docs_bg.wasm{version_suffix}"',
              "Dioxus wasm loader",
          )
          if f"{base_path}/wasm/amagi-docs_bg.wasm{version_suffix}" not in js:
              raise RuntimeError("Missing versioned Dioxus wasm module path")
          wasm_loader.write_text(js, encoding="utf-8")
          PY

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6.0.0

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: target/dx/amagi-docs/debug/web/public

  deploy-docs:
    name: deploy docs
    needs:
      - fmt
      - check
      - test
      - doc
      - docs-site
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
