name: Daily Build

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: Force a rebuild even if the daily tag already matches HEAD
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || 'scheduled' }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BUILD_TYPE: daily
  BIN_NAME: amagi

jobs:
  changes:
    name: detect changes
    permissions:
      contents: read
    runs-on: ubuntu-22.04
    outputs:
      should_build: ${{ steps.detect.outputs.should_build }}
      reason: ${{ steps.detect.outputs.reason }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect whether daily build is needed
        id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual force rebuild requested" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --force --tags origin

          head_sha="$(git rev-parse HEAD)"
          daily_sha="$(git rev-parse refs/tags/daily 2>/dev/null || true)"

          if [ -z "$daily_sha" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "reason=daily tag does not exist yet" >> "$GITHUB_OUTPUT"
          elif [ "$head_sha" != "$daily_sha" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "reason=HEAD differs from daily tag" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "reason=daily tag already points to HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Print decision
        run: echo "${{ steps.detect.outputs.reason }}"

  build:
    name: ${{ matrix.name }}
    needs: changes
    if: needs.changes.outputs.should_build == 'true'
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-gnu
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: amagi-x86_64-unknown-linux-gnu.tar.gz
          - name: linux-aarch64-gnu
            os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: amagi-aarch64-unknown-linux-gnu.tar.gz
            cross: true
          - name: linux-x86_64-musl
            os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            artifact: amagi-x86_64-unknown-linux-musl.tar.gz
            cross: true
          - name: linux-aarch64-musl
            os: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            artifact: amagi-aarch64-unknown-linux-musl.tar.gz
            cross: true
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            artifact: amagi-x86_64-apple-darwin.tar.gz
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            artifact: amagi-aarch64-apple-darwin.tar.gz
          - name: windows-x86_64-msvc
            os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: amagi-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --bin "$BIN_NAME" --target ${{ matrix.target }}
          else
            cargo build --release --locked --bin "$BIN_NAME" --target ${{ matrix.target }}
          fi

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        run: tar -czvf ${{ matrix.artifact }} -C target/${{ matrix.target }}/release ${{ env.BIN_NAME }}

      - name: Package (zip)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/${{ matrix.target }}/release/${{ env.BIN_NAME }}.exe -DestinationPath ${{ matrix.artifact }}

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    if: needs.changes.outputs.should_build == 'true'
    needs:
      - changes
      - build
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Delete old release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete daily --cleanup-tag -y || true
          git push --delete origin daily || true

      - name: Update Daily Tag
        run: |
          git tag -f daily
          git push -f origin daily

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: daily
          name: Daily Build
          body: "Automated daily build from latest code. Updated daily at UTC 00:00."
          prerelease: true
          files: dist/*
